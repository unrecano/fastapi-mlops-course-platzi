[tool.ruff]
# Set the maximum line length to 88 (Standard for Black and Ruff)
line-length = 88

# Exclude a variety of commonly ignored directories.
exclude = [
    ".git",
    "venv",
    ".venv",
    "__pycache__",
    ".pytest_cache",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-v --cov=src --cov-report=term-missing --cov-fail-under=80"
pythonpath = [
  "src"
]
